services:
  db:
    image: postgres:16
    container_name: ohdio_rss_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ohdio_rss_production
      POSTGRES_USER: ohdio_rss
      POSTGRES_PASSWORD: "CHANGE_ME_DB_PASSWORD"
    volumes:
      - /mnt/storage/apps/ohdio-rss/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ohdio_rss -d ohdio_rss_production"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    image: ghcr.io/unixcharles/ohdio-rss:latest
    container_name: ohdio_rss_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      # Random NAS port -> container port.
      - "38127:80"
    environment:
      RAILS_ENV: production
      RAILS_LOG_LEVEL: info
      SECRET_KEY_BASE: "CHANGE_ME_SECRET_KEY_BASE"
      SOLID_QUEUE_IN_PUMA: "true"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ohdio_rss_production
      DB_USER: ohdio_rss
      DB_PASSWORD: "CHANGE_ME_DB_PASSWORD"
    volumes:
      - /mnt/storage/apps/ohdio-rss/storage:/rails/storage
